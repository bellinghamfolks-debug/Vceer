name: Build Basir AI APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

env:
  ANDROID_COMPILE_SDK: '35'
  ANDROID_BUILD_TOOLS: '35.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight project structure
        run: |
          test -f settings.gradle
          test -f build.gradle
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/java/com/basir/ai/MainActivity.java
          test -f server/index.js
          test -f gradlew
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties
          grep -q "namespace 'com.basir.ai'" app/build.gradle
          grep -q "applicationId 'com.basir.ai'" app/build.gradle
          grep -q "versionName '0.4.1-build-audited'" app/build.gradle
          grep -q "android.useAndroidX=true" gradle.properties

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android packages
        run: sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}" "platform-tools"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show build tool versions
        run: |
          java -version
          ./gradlew --version
          sdkmanager --list_installed | grep -E "platforms;android-${ANDROID_COMPILE_SDK}|build-tools;${ANDROID_BUILD_TOOLS}" || true

      - name: Validate Gradle configuration
        run: ./gradlew tasks --no-daemon --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BasirAI-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
